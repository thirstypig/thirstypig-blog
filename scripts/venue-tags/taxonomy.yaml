# Curated tag taxonomy. Each tag is a category we'll classify reviews into,
# with a list of phrases that count as a hit. Case-insensitive substring match.
#
# A review is "tagged X" if any phrase in tag X's keywords appears in the
# review text. The output stores each tag's hit ratio (fraction of reviews
# mentioning it).
#
# Add new tags here. Remove tags that turn out noisy after the slice MVP.

