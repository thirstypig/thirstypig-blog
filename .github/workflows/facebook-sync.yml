name: Facebook Sync

# Pulls new Facebook Page posts via Graph API and commits them as Astro
# markdown. Auto-publishes (draft: false) per project preference.
#
# Triggers:
# - Hourly cron at :15 (avoid the top-of-hour rush on GitHub-hosted runners)
# - Manual workflow_dispatch for testing

on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch:

concurrency:
  group: fb-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install pyyaml

      - name: Run sync pipeline
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
        run: python scripts/facebook/sync_fb_pipeline.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/posts/ public/images/posts/
          if git diff --staged --quiet; then
            echo "No new posts."
            exit 0
          fi
          POSTS_ADDED=$(git diff --staged --name-only -- src/content/posts/ | grep -c '\-fb\-' || true)
          IMAGES_ADDED=$(git diff --staged --name-only -- public/images/posts/ | grep -c '\-fb\-' || true)
          git commit -m "Auto-import ${POSTS_ADDED} FB post(s), ${IMAGES_ADDED} image(s)"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying..."
            sleep 2
          done

      - name: Generate job summary
        if: always()
        run: |
          echo "## Facebook Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          POSTS=$(git diff HEAD~1 --name-only -- src/content/posts/ 2>/dev/null | grep -c '\-fb\-' || echo 0)
          IMAGES=$(git diff HEAD~1 --name-only -- public/images/posts/ 2>/dev/null | grep -c '\-fb\-' || echo 0)
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------:|" >> $GITHUB_STEP_SUMMARY
          echo "| Posts created | ${POSTS:-0} |" >> $GITHUB_STEP_SUMMARY
          echo "| Images downloaded | ${IMAGES:-0} |" >> $GITHUB_STEP_SUMMARY
