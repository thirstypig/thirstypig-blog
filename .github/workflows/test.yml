name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - run: npm run test:unit

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -r requirements-dev.txt

      - run: python3 -m pytest scripts/ -v

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Install Playwright browsers
        # Full matrix: Chromium + Firefox + WebKit. ~3× test time vs. Chromium
        # only, but catches browser-specific regressions (e.g. WebKit's
        # different Tab-keyboard-nav default caught in PR #61).
        run: npx playwright install --with-deps chromium firefox webkit

      # Build once, then Playwright's webServer reuses the existing preview
      - name: Build site
        # Skip Tina build (needs cloud creds that aren't available in CI) —
        # tests only need the Astro-built HTML/CSS/JS.
        run: npx astro build
        env:
          TINA_CLIENT_ID: ""
          TINA_TOKEN: ""

      - run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
